  - AND,((PROCESS-NAME,msedgewebview2.exe),(DOMAIN-SUFFIX,windows.com)),🚫 直连
  - AND,((PROCESS-NAME,msedgewebview2.exe),(DOMAIN-SUFFIX,windowsupdate.com)),🚫 直连
  - AND,((PROCESS-NAME,msedgewebview2.exe),(DOMAIN-SUFFIX,azure.com)),🚫 直连
  - AND,((PROCESS-NAME,msedgewebview2.exe),(DOMAIN-SUFFIX,bing.com)),🚫 直连
