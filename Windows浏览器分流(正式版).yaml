# ╔══════════════════════════════════════════════════════════════╗
# ║  Clash Party (mihomo) 覆写配置  Windows浏览器分流(正式版)      ║
# ║  目标：DNS 无泄露 · 流量不像代理 · 稳定快速                  ║
# ║  逻辑：Edge 可访国内+国外 / 其余浏览器仅走各自 VPS 代理       ║
# ╚══════════════════════════════════════════════════════════════╝
#
# 规则分流逻辑：
#   §1   所有浏览器 WebRTC/STUN/TURN UDP → 丢弃（防真实 IP 泄露）
#   §2   私有 / 内网 IP → 直连
#   §3   Windows 系统检测域名 → 直连（防托盘显示"无网络"）
#   §4   Edge + WebView2：CN 域名/IP → 直连
#   §4b  其他浏览器：CN 域名/IP → 拦截（防真实IP暴露，非Edge不上国内）
#   §5   Edge + WebView2：Microsoft 服务 → 直连
#   §6   Edge + WebView2：国内支付/电商 → 直连
#   §7   WebView2 兜底 → Edge 代理
#   §8   各浏览器进程 → 对应 VPS 代理组
#   §9   全局非浏览器 Microsoft 域名 → 直连
#   §10  广告 → 拦截
#   §11  GEOSITE/GEOIP CN → 直连（非浏览器进程）
#   §12  GEOSITE geolocation-!cn → 通用代理
#   §13  兜底 → 通用代理

# ── 全局基础 ──────────────────────────────────────────────────
ipv6: false
allow-lan: false
unified-delay: true
tcp-concurrent: true
keep-alive-interval: 15
keep-alive-idle: 600
udp-timeout: 60
find-process-mode: strict
log-level: warning
mode: rule

# ── GeoData ───────────────────────────────────────────────────
geodata-mode: true
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip:   "https://ghproxy.net/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat"
  geosite: "https://ghproxy.net/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb:    "https://ghproxy.net/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb"

# ── 状态持久化 ────────────────────────────────────────────────
profile:
  store-selected: true
  store-fake-ip: true

# ── 域名嗅探 ──────────────────────────────────────────────────
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
      override-destination: true
    QUIC:
      ports: [443, 8443]
      override-destination: false
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"
    - "+.local"
    - "+.lan"
    - "localhost"

# ── DNS ───────────────────────────────────────────────────────
dns:
  enable: true
  cache-algorithm: arc
  ipv6: false
  listen: 127.0.0.1:1053
  use-hosts: true
  use-system-hosts: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  prefer-h3: false

  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "localhost"
    - "+.localhost"
    - "+.home.arpa"
    - "time.windows.com"
    - "time.nist.gov"
    - "+.ntp.org"
    - "ntp.aliyun.com"
    - "ntp1.aliyun.com"
    - "ntp2.aliyun.com"
    - "ntp3.aliyun.com"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "connectivitycheck.gstatic.com"
    - "captive.apple.com"
    - "+.rdp.microsoft.com"
    - "+.remoteapp.windowsazure.com"
    - "+.wsd.microsoft.com"
    - "+.notify.windows.com"
    - "+.wns.windows.com"
    - "+.windowsupdate.com"
    - "+.update.microsoft.com"
    - "+.push.apple.com"
    - "+.office365.com"
    - "+.teams.microsoft.com"
    - "+.cloud.microsoft"
    - "+.sharepoint.com"
    - "+.skype.com"
    - "+.skypeforbusiness.com"
    - "+.onedrive.com"
    - "+.lync.com"
    - "_ipp._tcp.local"
    - "_pdl-datastream._tcp.local"
    - "_services._dns-sd._udp.local"
    - "+.stun.l.google.com"
    - "stun.google.com"
    - "+.stun.services.mozilla.com"
    - "stun.cloudflare.com"
    - "+.turn.twilio.com"
    - "+.global.turn.twilio.com"
    - "stun.stunprotocol.org"
    - "+.xirsys.com"
    - "+.relay.metered.ca"
    - "+.webrtc.org"
    - "stun.nextcloud.com"
    - "stun.voip.blackberry.com"
    - "+.coturn.net"
    - "stun.sipgate.net"
    - "stun.counterpath.com"
    - "stun.schlund.de"

  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  direct-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  direct-nameserver-follow-policy: true

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  nameserver:
    - "https://dns.cloudflare.com/dns-query#🌐 通用代理"
    - "https://dns.google/dns-query#🌐 通用代理"
    - "https://doh.opendns.com/dns-query#🌐 通用代理"

  nameserver-policy:
    "geosite:cn,private,apple,microsoft":
      - 223.5.5.5
      - 119.29.29.29
      - "https://dns.alidns.com/dns-query"
    "geosite:geolocation-!cn":
      - "https://dns.cloudflare.com/dns-query#🌐 通用代理"
      - "https://dns.google/dns-query#🌐 通用代理"

  disable-cache: false

# ── TUN 虚拟网卡 ──────────────────────────────────────────────
tun:
  enable: true
  stack: mixed
  device: Meta
  auto-route: true
  auto-redirect: false
  auto-detect-interface: true
  dns-hijack:
    - "any:53"
  endpoint-independent-nat: false
  strict-route: true
  mtu: 1350

proxy-providers:

  Edge-VPS1-Nodes:
    type: http
    url: "https://YOUR_EDGE_SUB_URL_HERE"
    path: ./providers/edge_vps1.yaml
    interval: 86400
    skip-cert-verify: false
    override:
      client-fingerprint: chrome
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300
      timeout: 5000
      lazy: true

  Chrome-VPS2-Nodes:
    type: http
    url: "https://YOUR_CHROME_SUB_URL_HERE"
