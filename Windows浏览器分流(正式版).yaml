  - name: "🚫 直连"
    type: select
    proxies:
      - DIRECT

  - name: "🛑 拦截"
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: "🚫 UDP静默丢弃"
    type: select
    proxies:
      - REJECT-DROP
      - REJECT

rules:

  # §1  所有浏览器（含 WebView2）WebRTC/STUN/TURN UDP → 丢弃
  - AND,((PROCESS-NAME,msedge.exe),(NETWORK,UDP),(DST-PORT,3478)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,msedge.exe),(NETWORK,UDP),(DST-PORT,5349)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,msedge.exe),(NETWORK,UDP),(DST-PORT,19302)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,msedgewebview2.exe),(NETWORK,UDP),(DST-PORT,3478)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,msedgewebview2.exe),(NETWORK,UDP),(DST-PORT,5349)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,msedgewebview2.exe),(NETWORK,UDP),(DST-PORT,19302)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,chrome.exe),(NETWORK,UDP),(DST-PORT,3478)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,chrome.exe),(NETWORK,UDP),(DST-PORT,5349)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,chrome.exe),(NETWORK,UDP),(DST-PORT,19302)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,chromium.exe),(NETWORK,UDP),(DST-PORT,3478)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,chromium.exe),(NETWORK,UDP),(DST-PORT,5349)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,chromium.exe),(NETWORK,UDP),(DST-PORT,19302)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,firefox.exe),(NETWORK,UDP),(DST-PORT,3478)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,firefox.exe),(NETWORK,UDP),(DST-PORT,5349)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,firefox.exe),(NETWORK,UDP),(DST-PORT,19302)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,firefox-nightly.exe),(NETWORK,UDP),(DST-PORT,3478)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,firefox-nightly.exe),(NETWORK,UDP),(DST-PORT,5349)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,firefox-nightly.exe),(NETWORK,UDP),(DST-PORT,19302)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,brave.exe),(NETWORK,UDP),(DST-PORT,3478)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,brave.exe),(NETWORK,UDP),(DST-PORT,5349)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,brave.exe),(NETWORK,UDP),(DST-PORT,19302)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,opera.exe),(NETWORK,UDP),(DST-PORT,3478)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,opera.exe),(NETWORK,UDP),(DST-PORT,5349)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,opera.exe),(NETWORK,UDP),(DST-PORT,19302)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,vivaldi.exe),(NETWORK,UDP),(DST-PORT,3478)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,vivaldi.exe),(NETWORK,UDP),(DST-PORT,5349)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,vivaldi.exe),(NETWORK,UDP),(DST-PORT,19302)),🚫 UDP静默丢弃

  # §2  私有 / 内网 IP → 直连
  - IP-CIDR,127.0.0.0/8,🚫 直连,no-resolve
  - IP-CIDR,10.0.0.0/8,🚫 直连,no-resolve
  - IP-CIDR,172.16.0.0/12,🚫 直连,no-resolve
  - IP-CIDR,192.168.0.0/16,🚫 直连,no-resolve
  - IP-CIDR,169.254.0.0/16,🚫 直连,no-resolve
  - IP-CIDR,224.0.0.0/4,🚫 直连,no-resolve
  - IP-CIDR,240.0.0.0/4,🚫 直连,no-resolve

  # §3  Windows 系统网络检测域名 → 直连
  - DOMAIN,www.msftconnecttest.com,🚫 直连
  - DOMAIN,ipv6.msftconnecttest.com,🚫 直连
  - DOMAIN,www.msftncsi.com,🚫 直连
  - DOMAIN,dns.msftncsi.com,🚫 直连
  - DOMAIN,time.windows.com,🚫 直连

  # §4  Edge + WebView2：中国大陆域名/IP → 直连
  - AND,((PROCESS-NAME,msedge.exe),(GEOSITE,cn)),🚫 直连
  - AND,((PROCESS-NAME,msedge.exe),(GEOIP,cn)),🚫 直连
  - AND,((PROCESS-NAME,msedgewebview2.exe),(GEOSITE,cn)),🚫 直连
  - AND,((PROCESS-NAME,msedgewebview2.exe),(GEOIP,cn)),🚫 直连

  # §4b 其他浏览器：中国大陆域名/IP → 拦截（非Edge不上国内，防真实IP暴露）
  - AND,((PROCESS-NAME,chrome.exe),(GEOSITE,cn)),🛑 拦截
  - AND,((PROCESS-NAME,chrome.exe),(GEOIP,cn)),🛑 拦截
  - AND,((PROCESS-NAME,chromium.exe),(GEOSITE,cn)),🛑 拦截
  - AND,((PROCESS-NAME,chromium.exe),(GEOIP,cn)),🛑 拦截
  - AND,((PROCESS-NAME,firefox.exe),(GEOSITE,cn)),🛑 拦截
  - AND,((PROCESS-NAME,firefox.exe),(GEOIP,cn)),🛑 拦截
  - AND,((PROCESS-NAME,firefox-nightly.exe),(GEOSITE,cn)),🛑 拦截
  - AND,((PROCESS-NAME,firefox-nightly.exe),(GEOIP,cn)),🛑 拦截
  - AND,((PROCESS-NAME,brave.exe),(GEOSITE,cn)),🛑 拦截
  - AND,((PROCESS-NAME,brave.exe),(GEOIP,cn)),🛑 拦截
  - AND,((PROCESS-NAME,opera.exe),(GEOSITE,cn)),🛑 拦截
  - AND,((PROCESS-NAME,opera.exe),(GEOIP,cn)),🛑 拦截
  - AND,((PROCESS-NAME,vivaldi.exe),(GEOSITE,cn)),🛑 拦截
  - AND,((PROCESS-NAME,vivaldi.exe),(GEOIP,cn)),🛑 拦截

  # §5  Edge + WebView2：Microsoft 服务 → 直连
  - AND,((PROCESS-NAME,msedge.exe),(DOMAIN-SUFFIX,microsoft.com)),🚫 直连
  - AND,((PROCESS-NAME,msedge.exe),(DOMAIN-SUFFIX,microsoftonline.com)),🚫 直连
