      - Opera-VPS5-Nodes
    proxies:
      - "🔴 Opera自动"
      - "🔴 Opera故障切换"

  - name: "🔴 Opera自动"
    type: url-test
    use:
      - Opera-VPS5-Nodes
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    timeout: 5000
    tolerance: 50
    lazy: true

  - name: "🔴 Opera故障切换"
