  - name: "🌐 通用代理"
    type: select
    proxies:
      - "🔍 Edge代理"
      - "🟢 Chrome代理"
      - "🦊 Firefox代理"
      - "🦁 Brave代理"
      - "🔴 Opera代理"
      - "🟡 Vivaldi代理"
