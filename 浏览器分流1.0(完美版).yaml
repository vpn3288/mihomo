ipv6: false
allow-lan: false
unified-delay: true
tcp-concurrent: true          # 并发 TCP 握手，取最快路径
keep-alive-interval: 15       # 心跳间隔（秒），防 NAT 超时断连
keep-alive-idle: 600
udp-timeout: 60               # UDP 状态保活 60s，防 VPS 端口被僵尸连接耗尽
find-process-mode: strict
log-level: warning
mode: rule

# ── GeoData ───────────────────────────────────────────────────
geodata-mode: true
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip:   "https://ghproxy.net/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat"
  geosite: "https://ghproxy.net/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb:    "https://ghproxy.net/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb"

# ── 状态持久化 ────────────────────────────────────────────────
profile:
  store-selected: true
  store-fake-ip: true         # 保留 fake-ip 映射，重启后防 DNS 泄露

# ── 域名嗅探 ──────────────────────────────────────────────────
sniffer:
  enable: true
  force-dns-mapping: true     # TUN 捕获的裸 IP 连接也映射域名，配合 fake-ip
  parse-pure-ip: true         # 对纯 IP 连接嗅探，恢复真实域名
  override-destination: true  # 用嗅探域名替换目标，防 IP 直连绕规则
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
      override-destination: true
    QUIC:
      ports: [443, 8443]
      override-destination: false  # QUIC 不替换目标，防误判
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"
    - "+.local"
    - "+.lan"
    - "localhost"

# ── DNS ───────────────────────────────────────────────────────
dns:
  enable: true
  cache-algorithm: arc        # ARC 比 LRU 命中率更高
  ipv6: false
  listen: 127.0.0.1:1053
  use-hosts: true
  use-system-hosts: false
  respect-rules: true         # DNS 请求遵循路由规则，随流量走对应出口
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  prefer-h3: false            # respect-rules=true 时官方不建议开启 H3

  # 这些域名返回真实 IP，不走 fake-ip 映射
  fake-ip-filter:
    # 本地 / 局域网
    - "+.lan"
    - "+.local"
    - "localhost"
    - "+.localhost"
    - "+.home.arpa"
    # NTP 时间同步
    - "time.windows.com"
    - "time.nist.gov"
    - "+.ntp.org"
    - "ntp.aliyun.com"
    - "ntp1.aliyun.com"
    - "ntp2.aliyun.com"
    - "ntp3.aliyun.com"
    # Windows 网络连通性检测（fake-ip 劫持会导致系统显示"无网络"）
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "connectivitycheck.gstatic.com"
    - "captive.apple.com"
    # Windows 系统服务
    - "+.rdp.microsoft.com"
    - "+.remoteapp.windowsazure.com"
    - "+.wsd.microsoft.com"
    - "+.notify.windows.com"
    - "+.wns.windows.com"
    - "+.windowsupdate.com"
    - "+.update.microsoft.com"
    # Apple 推送
    - "+.push.apple.com"
    # Microsoft 365 / Teams（认证需要真实 IP 解析）
    - "+.office365.com"
    - "+.teams.microsoft.com"
    - "+.cloud.microsoft"
    - "+.sharepoint.com"
    - "+.skype.com"
    - "+.skypeforbusiness.com"
    - "+.onedrive.com"
    - "+.lync.com"
    # mDNS / 本地服务发现
    - "_ipp._tcp.local"
    - "_pdl-datastream._tcp.local"
    - "_services._dns-sd._udp.local"
    # STUN / TURN / WebRTC（返回真实 IP 后由 §1 规则丢弃，防 WebRTC 泄露真实 IP）
    - "+.stun.l.google.com"
    - "stun.google.com"
    - "+.stun.services.mozilla.com"
    - "stun.cloudflare.com"
    - "+.turn.twilio.com"
    - "+.global.turn.twilio.com"
    - "stun.stunprotocol.org"
    - "+.xirsys.com"
    - "+.relay.metered.ca"
    - "+.webrtc.org"
    - "stun.nextcloud.com"
    - "stun.voip.blackberry.com"
    - "+.coturn.net"
    - "stun.sipgate.net"
    - "stun.counterpath.com"
    - "stun.schlund.de"

  # 专门用于解析代理节点域名，直连发出，防启动时的 DNS 死锁
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 直连流量（国内域名）专用 DNS，不绕道走代理 DoH，更快更干净
  direct-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  direct-nameserver-follow-policy: true

  # 解析 DoH/DoT 服务器自身域名，必须为纯 IP
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 主 DNS：通过代理 DoH，防 ISP 投毒/劫持
  nameserver:
    - "https://dns.cloudflare.com/dns-query#proxy"
    - "https://dns.google/dns-query#proxy"
    - "https://doh.opendns.com/dns-query#proxy"

  # 按域名策略分流 DNS
  nameserver-policy:
    "geosite:cn,private,apple,microsoft":   # 国内域名走国内 DNS，快且准
      - 223.5.5.5
      - 119.29.29.29
      - "https://dns.alidns.com/dns-query"
    "geosite:geolocation-!cn":              # 国外域名走代理 DoH，防污染
      - "https://dns.cloudflare.com/dns-query#proxy"
      - "https://dns.google/dns-query#proxy"

  # Fallback：nameserver 返回污染结果时的兜底，走代理给出正确答案
  fallback:
    - "tls://1.1.1.1#proxy"
    - "tls://8.8.8.8#proxy"

  fallback-filter:
    geoip: true
    geoip-code: CN            # 返回 CN IP 视为污染，改用 fallback 结果
    geosite:
      - gfw                   # GFW 封锁域名强制走 fallback
    ipcidr:
      - 240.0.0.0/4           # 保留地址段，必为污染
      - 0.0.0.0/32
  disable-cache: false

# ── TUN 虚拟网卡 ──────────────────────────────────────────────
tun:
  enable: true
  stack: mixed                # TCP→system（快），UDP→gvisor（稳），Windows 推荐
  device: Meta
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  dns-hijack:
    - "any:53"                # 劫持所有 53 端口 DNS，防系统 DNS 泄露
  endpoint-independent-nat: true  # 改善 UDP 打洞兼容性（P2P / VoIP）
  strict-route: true          # 强制所有流量进入规则，防应用绕行 TUN
  mtu: 1350

# ╔══════════════════════════════════════════════════════════════╗
# ║  代理提供者                                                   ║
# ║  每个浏览器对应独立订阅 → 独立 VPS → 独立 IP                  ║
# ║                                                              ║
# ║  ⚠️  首次使用冷启动说明：                                      ║
# ║  dialer-proxy 让订阅更新走代理，ISP 看不到订阅域名。            ║
# ║  但首次运行时本地缓存为空，代理组无节点可用，订阅拉取会失败。    ║
# ║  解决方案：首次部署后，在 Clash Party 界面手动点击              ║
# ║  "更新全部订阅"完成初始化；后续更新均自动走代理。               ║
# ║  或：首次部署时临时注释掉所有 dialer-proxy 行，完成后恢复。      ║
# ╚══════════════════════════════════════════════════════════════╝

