# Clash Party (mihomo) 覆写配置 · Windows 浏览器分流 · v2.4
# v2.4: 清除所有历史注释 + 添加 geosite-matcher: mph（GEOSITE 查找加速）

ipv6: false
allow-lan: false
unified-delay: true
tcp-concurrent: true
keep-alive-interval: 15
keep-alive-idle: 300
find-process-mode: strict
log-level: warning
mode: rule

geodata-mode: true
geodata-loader: standard
geosite-matcher: mph
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip:   "https://ghproxy.net/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat"
  geosite: "https://ghproxy.net/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb:    "https://ghproxy.net/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb"

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
      override-destination: true
    QUIC:
      ports: [443, 8443]
      override-destination: false
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"
    - "+.local"
    - "+.lan"
    - "localhost"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "time.windows.com"

dns:
  enable: true
  cache-algorithm: arc
  ipv6: false
  listen: 127.0.0.1:1053
  use-hosts: true
  use-system-hosts: true
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "localhost"
    - "+.localhost"
    - "+.home.arpa"
    - "time.windows.com"
    - "time.nist.gov"
    - "+.ntp.org"
    - "ntp.aliyun.com"
    - "ntp1.aliyun.com"
    - "ntp2.aliyun.com"
    - "ntp3.aliyun.com"
    - "ntp.tencent.com"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "connectivitycheck.gstatic.com"
    - "captive.apple.com"
    - "_ipp._tcp.local"
    - "_pdl-datastream._tcp.local"
    - "_services._dns-sd._udp.local"

  # 隧道建立前专用，必须纯 IP，无循环依赖
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # Edge 直连 CN 域名时重解析真实 IP
  direct-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  direct-nameserver-follow-policy: false

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  nameserver:
    - "https://dns.cloudflare.com/dns-query#🌐 DNS代理"
    - "https://dns.google/dns-query#🌐 DNS代理"

  nameserver-policy:
    "geosite:private":
      - 223.5.5.5
      - 119.29.29.29
    "geosite:geolocation-!cn":
      - "https://dns.cloudflare.com/dns-query#🌐 DNS代理"
      - "https://dns.google/dns-query#🌐 DNS代理"

tun:
  enable: true
  stack: mixed
  device: Meta
  auto-route: true
  auto-redirect: false
  auto-detect-interface: true
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  endpoint-independent-nat: false
  strict-route: true
  mtu: 9000
  udp-timeout: 300

proxy-providers:

  Edge-VPS1-Nodes:
    type: http
    url: "https://YOUR_EDGE_SUB_URL_HERE"
    path: ./providers/edge_vps1.yaml
    interval: 86400
    skip-cert-verify: false
    override:
      client-fingerprint: chrome
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300
      timeout: 5000
      lazy: true

  Chrome-VPS2-Nodes:
    type: http
    url: "https://YOUR_CHROME_SUB_URL_HERE"
    path: ./providers/chrome_vps2.yaml
    interval: 86400
    skip-cert-verify: false
    override:
      client-fingerprint: chrome
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300
      timeout: 5000
      lazy: true

  Firefox-VPS3-Nodes:
    type: http
    url: "https://YOUR_FIREFOX_SUB_URL_HERE"
    path: ./providers/firefox_vps3.yaml
    interval: 86400
    skip-cert-verify: false
    override:
      client-fingerprint: firefox
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300
      timeout: 5000
      lazy: true

  Brave-VPS4-Nodes:
    type: http
    url: "https://YOUR_BRAVE_SUB_URL_HERE"
    path: ./providers/brave_vps4.yaml
    interval: 86400
    skip-cert-verify: false
    override:
      client-fingerprint: chrome
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300
      timeout: 5000
      lazy: true

  Opera-VPS5-Nodes:
    type: http
    url: "https://YOUR_OPERA_SUB_URL_HERE"
    path: ./providers/opera_vps5.yaml
    interval: 86400
    skip-cert-verify: false
    override:
      client-fingerprint: chrome
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300
      timeout: 5000
      lazy: true

  Vivaldi-VPS6-Nodes:
    type: http
    url: "https://YOUR_VIVALDI_SUB_URL_HERE"
    path: ./providers/vivaldi_vps6.yaml
    interval: 86400
    skip-cert-verify: false
    override:
      client-fingerprint: chrome
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300
      timeout: 5000
      lazy: true

proxy-groups:

  - name: "🔍 Edge代理"
    type: select
    use:
      - Edge-VPS1-Nodes
    proxies:
      - "🔍 Edge自动"
      - "🔍 Edge故障切换"

  - name: "🔍 Edge自动"
    type: url-test
    use:
      - Edge-VPS1-Nodes
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    timeout: 5000
    tolerance: 50
    lazy: true

  - name: "🔍 Edge故障切换"
    type: fallback
    use:
      - Edge-VPS1-Nodes
    url: "https://www.gstatic.com/generate_204"
    interval: 60
    timeout: 5000
    lazy: false

  - name: "🟢 Chrome代理"
    type: select
    use:
      - Chrome-VPS2-Nodes
    proxies:
      - "🟢 Chrome自动"
      - "🟢 Chrome故障切换"

  - name: "🟢 Chrome自动"
    type: url-test
    use:
      - Chrome-VPS2-Nodes
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    timeout: 5000
    tolerance: 50
    lazy: true

  - name: "🟢 Chrome故障切换"
    type: fallback
    use:
      - Chrome-VPS2-Nodes
    url: "https://www.gstatic.com/generate_204"
    interval: 60
    timeout: 5000
    lazy: false

  - name: "🦊 Firefox代理"
    type: select
    use:
      - Firefox-VPS3-Nodes
    proxies:
      - "🦊 Firefox自动"
      - "🦊 Firefox故障切换"

  - name: "🦊 Firefox自动"
    type: url-test
    use:
      - Firefox-VPS3-Nodes
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    timeout: 5000
    tolerance: 50
    lazy: true

  - name: "🦊 Firefox故障切换"
    type: fallback
    use:
      - Firefox-VPS3-Nodes
    url: "https://www.gstatic.com/generate_204"
    interval: 60
    timeout: 5000
    lazy: false

  - name: "🦁 Brave代理"
    type: select
    use:
      - Brave-VPS4-Nodes
    proxies:
      - "🦁 Brave自动"
      - "🦁 Brave故障切换"

  - name: "🦁 Brave自动"
    type: url-test
    use:
      - Brave-VPS4-Nodes
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    timeout: 5000
    tolerance: 50
    lazy: true

  - name: "🦁 Brave故障切换"
    type: fallback
    use:
      - Brave-VPS4-Nodes
    url: "https://www.gstatic.com/generate_204"
    interval: 60
    timeout: 5000
    lazy: false

  - name: "🔴 Opera代理"
    type: select
    use:
      - Opera-VPS5-Nodes
    proxies:
      - "🔴 Opera自动"
      - "🔴 Opera故障切换"

  - name: "🔴 Opera自动"
    type: url-test
    use:
      - Opera-VPS5-Nodes
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    timeout: 5000
    tolerance: 50
    lazy: true

  - name: "🔴 Opera故障切换"
    type: fallback
    use:
      - Opera-VPS5-Nodes
    url: "https://www.gstatic.com/generate_204"
    interval: 60
    timeout: 5000
    lazy: false

  - name: "🟡 Vivaldi代理"
    type: select
    use:
      - Vivaldi-VPS6-Nodes
    proxies:
      - "🟡 Vivaldi自动"
      - "🟡 Vivaldi故障切换"

  - name: "🟡 Vivaldi自动"
    type: url-test
    use:
      - Vivaldi-VPS6-Nodes
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    timeout: 5000
    tolerance: 50
    lazy: true

  - name: "🟡 Vivaldi故障切换"
    type: fallback
    use:
      - Vivaldi-VPS6-Nodes
    url: "https://www.gstatic.com/generate_204"
    interval: 60
    timeout: 5000
    lazy: false

  - name: "🌐 DNS代理"
    # 首次加载后在 UI 中确认选中某个代理（建议选延迟最低的 VPS）
    type: select
    proxies:
      - "🟢 Chrome代理"
      - "🔍 Edge代理"
      - "🦊 Firefox代理"
      - "🦁 Brave代理"
      - "🔴 Opera代理"
      - "🟡 Vivaldi代理"

  - name: "🌐 通用代理"
    type: select
    proxies:
      - "🟢 Chrome代理"
      - "🔍 Edge代理"
      - "🦊 Firefox代理"
      - "🦁 Brave代理"
      - "🔴 Opera代理"
      - "🟡 Vivaldi代理"
      - "🚫 直连"

  - name: "🚫 直连"
    type: select
    proxies:
      - DIRECT

  - name: "🛑 拦截"
    type: select
    proxies:
      - REJECT
      - REJECT-DROP

  - name: "🚫 UDP静默丢弃"
    type: select
    proxies:
      - REJECT-DROP
      - REJECT

  - name: "🚫 CN拦截"
    type: select
    proxies:
      - REJECT-DROP
      - REJECT

rules:

  # §0 DoT/DoQ 853 → 拦截（防绕过 dns-hijack）
  - AND,((NETWORK,TCP),(DST-PORT,853)),🛑 拦截
  - AND,((NETWORK,UDP),(DST-PORT,853)),🛑 拦截

  # §1 所有浏览器 WebRTC/STUN/TURN UDP → 静默丢弃
  - AND,((PROCESS-NAME,msedge.exe),(NETWORK,UDP),(DST-PORT,3478-3481)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,msedge.exe),(NETWORK,UDP),(DST-PORT,5349-5350)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,msedge.exe),(NETWORK,UDP),(DST-PORT,19302-19309)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,msedgewebview2.exe),(NETWORK,UDP),(DST-PORT,3478-3481)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,msedgewebview2.exe),(NETWORK,UDP),(DST-PORT,5349-5350)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,msedgewebview2.exe),(NETWORK,UDP),(DST-PORT,19302-19309)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,chrome.exe),(NETWORK,UDP),(DST-PORT,3478-3481)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,chrome.exe),(NETWORK,UDP),(DST-PORT,5349-5350)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,chrome.exe),(NETWORK,UDP),(DST-PORT,19302-19309)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,chromium.exe),(NETWORK,UDP),(DST-PORT,3478-3481)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,chromium.exe),(NETWORK,UDP),(DST-PORT,5349-5350)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,chromium.exe),(NETWORK,UDP),(DST-PORT,19302-19309)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,firefox.exe),(NETWORK,UDP),(DST-PORT,3478-3481)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,firefox.exe),(NETWORK,UDP),(DST-PORT,5349-5350)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,firefox.exe),(NETWORK,UDP),(DST-PORT,19302-19309)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,firefox-nightly.exe),(NETWORK,UDP),(DST-PORT,3478-3481)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,firefox-nightly.exe),(NETWORK,UDP),(DST-PORT,5349-5350)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,firefox-nightly.exe),(NETWORK,UDP),(DST-PORT,19302-19309)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,brave.exe),(NETWORK,UDP),(DST-PORT,3478-3481)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,brave.exe),(NETWORK,UDP),(DST-PORT,5349-5350)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,brave.exe),(NETWORK,UDP),(DST-PORT,19302-19309)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,opera.exe),(NETWORK,UDP),(DST-PORT,3478-3481)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,opera.exe),(NETWORK,UDP),(DST-PORT,5349-5350)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,opera.exe),(NETWORK,UDP),(DST-PORT,19302-19309)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,opera_gx.exe),(NETWORK,UDP),(DST-PORT,3478-3481)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,opera_gx.exe),(NETWORK,UDP),(DST-PORT,5349-5350)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,opera_gx.exe),(NETWORK,UDP),(DST-PORT,19302-19309)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,vivaldi.exe),(NETWORK,UDP),(DST-PORT,3478-3481)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,vivaldi.exe),(NETWORK,UDP),(DST-PORT,5349-5350)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,vivaldi.exe),(NETWORK,UDP),(DST-PORT,19302-19309)),🚫 UDP静默丢弃

  # §1b 非 Edge 浏览器 QUIC UDP/443 → 静默丢弃
  - AND,((PROCESS-NAME,chrome.exe),(NETWORK,UDP),(DST-PORT,443)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,chromium.exe),(NETWORK,UDP),(DST-PORT,443)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,firefox.exe),(NETWORK,UDP),(DST-PORT,443)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,firefox-nightly.exe),(NETWORK,UDP),(DST-PORT,443)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,brave.exe),(NETWORK,UDP),(DST-PORT,443)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,opera.exe),(NETWORK,UDP),(DST-PORT,443)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,opera_gx.exe),(NETWORK,UDP),(DST-PORT,443)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,vivaldi.exe),(NETWORK,UDP),(DST-PORT,443)),🚫 UDP静默丢弃

  # §2 私有 / 内网 / CGNAT IP → 直连
  - IP-CIDR,127.0.0.0/8,🚫 直连,no-resolve
  - IP-CIDR,10.0.0.0/8,🚫 直连,no-resolve
  - IP-CIDR,172.16.0.0/12,🚫 直连,no-resolve
  - IP-CIDR,192.168.0.0/16,🚫 直连,no-resolve
  - IP-CIDR,169.254.0.0/16,🚫 直连,no-resolve
  - IP-CIDR,100.64.0.0/10,🚫 直连,no-resolve
  - IP-CIDR,224.0.0.0/4,🚫 直连,no-resolve
  - IP-CIDR,240.0.0.0/4,🚫 直连,no-resolve

  # §3 Windows NCSI / NTP → 直连
  - DOMAIN,www.msftconnecttest.com,🚫 直连
  - DOMAIN,ipv6.msftconnecttest.com,🚫 直连
  - DOMAIN,www.msftncsi.com,🚫 直连
  - DOMAIN,dns.msftncsi.com,🚫 直连
  - DOMAIN,connectivitycheck.gstatic.com,🚫 直连
  - DOMAIN,captive.apple.com,🚫 直连
  - DOMAIN,time.windows.com,🚫 直连
  - DOMAIN,time.nist.gov,🚫 直连
  - DOMAIN,ntp.aliyun.com,🚫 直连
  - DOMAIN,ntp1.aliyun.com,🚫 直连
  - DOMAIN,ntp2.aliyun.com,🚫 直连
  - DOMAIN,ntp3.aliyun.com,🚫 直连
  - DOMAIN,ntp.tencent.com,🚫 直连
  - DOMAIN-SUFFIX,ntp.org,🚫 直连

  # §4-geo Edge + WebView2：所有微软域名 → 强制代理（必须在 §4 之前）
  # edgeservices.bing.com 显式保留：bing.com 属于 GEOSITE,cn，需先截获
  - AND,((PROCESS-NAME,msedge.exe),(DOMAIN-SUFFIX,edgeservices.bing.com)),🔍 Edge代理
  - AND,((PROCESS-NAME,msedgewebview2.exe),(DOMAIN-SUFFIX,edgeservices.bing.com)),🔍 Edge代理
  # GEOSITE,microsoft 面覆盖：microsoft.com / windowsazure.com / office.com 等全部走代理
  - AND,((PROCESS-NAME,msedge.exe),(GEOSITE,microsoft)),🔍 Edge代理
  - AND,((PROCESS-NAME,msedgewebview2.exe),(GEOSITE,microsoft)),🔍 Edge代理

  # §4 Edge + WebView2：CN 域名/IP → 直连
  - AND,((PROCESS-NAME,msedge.exe),(GEOSITE,cn)),🚫 直连
  - AND,((PROCESS-NAME,msedge.exe),(GEOIP,cn,no-resolve)),🚫 直连
  - AND,((PROCESS-NAME,msedgewebview2.exe),(GEOSITE,cn)),🚫 直连
  - AND,((PROCESS-NAME,msedgewebview2.exe),(GEOIP,cn,no-resolve)),🚫 直连

  # §4b 非 Edge 浏览器：CN 域名/IP → REJECT-DROP
  - AND,((PROCESS-NAME,chrome.exe),(GEOSITE,cn)),🚫 CN拦截
  - AND,((PROCESS-NAME,chrome.exe),(GEOIP,cn,no-resolve)),🚫 CN拦截
  - AND,((PROCESS-NAME,chromium.exe),(GEOSITE,cn)),🚫 CN拦截
  - AND,((PROCESS-NAME,chromium.exe),(GEOIP,cn,no-resolve)),🚫 CN拦截
  - AND,((PROCESS-NAME,firefox.exe),(GEOSITE,cn)),🚫 CN拦截
  - AND,((PROCESS-NAME,firefox.exe),(GEOIP,cn,no-resolve)),🚫 CN拦截
  - AND,((PROCESS-NAME,firefox-nightly.exe),(GEOSITE,cn)),🚫 CN拦截
  - AND,((PROCESS-NAME,firefox-nightly.exe),(GEOIP,cn,no-resolve)),🚫 CN拦截
  - AND,((PROCESS-NAME,brave.exe),(GEOSITE,cn)),🚫 CN拦截
  - AND,((PROCESS-NAME,brave.exe),(GEOIP,cn,no-resolve)),🚫 CN拦截
  - AND,((PROCESS-NAME,opera.exe),(GEOSITE,cn)),🚫 CN拦截
  - AND,((PROCESS-NAME,opera.exe),(GEOIP,cn,no-resolve)),🚫 CN拦截
  - AND,((PROCESS-NAME,opera_gx.exe),(GEOSITE,cn)),🚫 CN拦截
  - AND,((PROCESS-NAME,opera_gx.exe),(GEOIP,cn,no-resolve)),🚫 CN拦截
  - AND,((PROCESS-NAME,vivaldi.exe),(GEOSITE,cn)),🚫 CN拦截
  - AND,((PROCESS-NAME,vivaldi.exe),(GEOIP,cn,no-resolve)),🚫 CN拦截

  # §7 WebView2 兜底 → Edge 代理
  - PROCESS-NAME,msedgewebview2.exe,🔍 Edge代理

  # §8 各浏览器进程 → 对应 VPS 代理组
  - PROCESS-NAME,msedge.exe,🔍 Edge代理
  - PROCESS-NAME,msedge_proxy.exe,🔍 Edge代理
  - PROCESS-NAME,MicrosoftEdgeUpdate.exe,🚫 直连
  - PROCESS-NAME,chrome.exe,🟢 Chrome代理
  - PROCESS-NAME,chromium.exe,🟢 Chrome代理
  - PROCESS-NAME,chrome_proxy.exe,🟢 Chrome代理
  - PROCESS-NAME,GoogleUpdate.exe,🚫 直连
  - PROCESS-NAME,firefox.exe,🦊 Firefox代理
  - PROCESS-NAME,firefox-nightly.exe,🦊 Firefox代理
  - PROCESS-NAME,plugin-container.exe,🦊 Firefox代理
  - PROCESS-NAME,brave.exe,🦁 Brave代理
  - PROCESS-NAME,BraveUpdate.exe,🚫 直连
  - PROCESS-NAME,opera.exe,🔴 Opera代理
  - PROCESS-NAME,opera_gx.exe,🔴 Opera代理
  - PROCESS-NAME,opera_autoupdate.exe,🚫 直连
  - PROCESS-NAME,vivaldi.exe,🟡 Vivaldi代理

  # §10 广告拦截
  - GEOSITE,category-ads-all,🛑 拦截

  # §11 国内流量（非浏览器系统进程）→ 直连
  - GEOSITE,cn,🚫 直连
  - GEOIP,cn,🚫 直连,no-resolve

  # §12 国外域名（非浏览器进程）→ 通用代理
  - GEOSITE,geolocation-!cn,🌐 通用代理

  # §13 兜底
  - MATCH,🌐 通用代理
