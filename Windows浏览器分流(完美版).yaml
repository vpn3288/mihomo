# ╔══════════════════════════════════════════════════════════════════╗
# ║  Clash Party (mihomo) 覆写配置                                   ║
# ║  Windows 浏览器分流 · 完美版 v1.4                                 ║
# ╠══════════════════════════════════════════════════════════════════╣
# ║  【v1.4 变更】                                                    ║
# ║  [v1.4-新增] §1b 非 Edge 浏览器 QUIC UDP/443 → 静默丢弃          ║
# ║    VMess/VLESS/Trojan 均为 TCP 隧道，无法有效中继 UDP。            ║
# ║    QUIC 包进入 §8 后握手超时 → 触发 H3→TCP 降级 →                ║
# ║    降级抖动反而产生代理特征。丢弃后浏览器直接走 TCP/TLS，干净利落。 ║
# ║    Edge 保留 QUIC（Edge VPS 可能支持 UDP 中继，且 Edge 行为差异大）║
# ║  [v1.3] fallback 故障切换组全部显式设置 lazy: false               ║
# ╠══════════════════════════════════════════════════════════════════╣
# ║  【v1.4 AI 建议审核】                                             ║
# ║                                                                  ║
# ║  ❌ 驳回：DoH 地址追加 &client-fingerprint=chrome（AI建议1）      ║
# ║    DoH nameserver 均标注了 #🌐 通用代理，DNS 查询经过加密隧道      ║
# ║    发出，DPI 看到的是 VPS 隧道的 TLS 握手特征，而非 DoH 本身的。  ║
# ║    DoH 的 TLS 握手完全包裹在隧道内，对外不可见，加指纹无意义。     ║
# ║                                                                  ║
# ║  ❌ 驳回：nameserver-policy Chrome CN 域名泄露（AI建议2）          ║
# ║    同 v1.2/v1.3 驳回理由：fake-ip 模式下 Chrome 访问 baidu.com   ║
# ║    → Mihomo 直接返回 198.18.x.x 假 IP，不触发任何 DNS 查询，      ║
# ║    nameserver-policy 根本不会被调用。ISP 不可见任何 DNS 记录。     ║
# ║                                                                  ║
# ║  ❌ 驳回：MTU 改 1400 + auto-mss: true（AI建议3）                 ║
# ║    同 v1.0/v1.2/v1.3 驳回：mtu:9000 针对 TUN 虚拟接口内部，      ║
# ║    物理出口 MTU 由 OS PMTUD 自动协商，TUN 层设置对物理出口无影响。  ║
# ║    auto-mss 不是 mihomo TUN 的有效字段，写入会被静默忽略。          ║
# ║                                                                  ║
# ║  ❌ 驳回：ipv6: false（AI建议4）                                  ║
# ║    全局第一行已设置，AI 未阅读文件。                               ║
# ║                                                                  ║
# ║  ❌ 驳回：DST-PORT 范围拆分（AI建议5）                             ║
# ║    mihomo 明确支持 DST-PORT 范围语法（3478-3481），                ║
# ║    AND 规则中经充分验证，无需拆分。保留范围写法更简洁。             ║
# ║                                                                  ║
# ║  ❌ 驳回：udp-timeout 300→120（再次）                             ║
# ║    300s 是官方 TUN 文档默认值，QUIC 长连接需要，保持不变。          ║
# ╚══════════════════════════════════════════════════════════════════╝
#
# 规则分流逻辑：
#   §0   DST-PORT 853 → 拦截（防 Windows DoT 绕过 dns-hijack）
#   §1   所有浏览器 WebRTC/STUN/TURN UDP → 静默丢弃
#   §1b  非 Edge 浏览器 QUIC UDP/443 → 静默丢弃
#   §2   私有 / 内网 / CGNAT IP → 直连
#   §3   Windows NCSI / NTP → 直连
#   §4   Edge + WebView2：CN 域名/IP → 直连
#   §4b  其他浏览器：CN 域名/IP → 拦截
#   §5   Edge + WebView2：Microsoft 服务 → 直连
#   §6   Edge + WebView2：国内支付/电商 → 直连
#   §7   WebView2 兜底 → Edge 代理
#   §8   各浏览器进程 → 对应 VPS 代理组
#   §9   全局非浏览器 Microsoft 域名 → 直连
#   §10  广告 → 拦截
#   §11  GEOSITE/GEOIP CN → 直连（非浏览器进程）
#   §12  geolocation-!cn → 通用代理
#   §13  MATCH → 通用代理

# ── 全局 ─────────────────────────────────────────────────────────
ipv6: false
allow-lan: false
unified-delay: true
tcp-concurrent: true
keep-alive-interval: 15
keep-alive-idle: 300
find-process-mode: strict
log-level: warning
mode: rule

# ── GeoData ──────────────────────────────────────────────────────
geodata-mode: true
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip:   "https://ghproxy.net/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat"
  geosite: "https://ghproxy.net/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb:    "https://ghproxy.net/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb"

# ── 状态持久化 ────────────────────────────────────────────────────
profile:
  store-selected: true
  store-fake-ip: true

# ── 域名嗅探 ─────────────────────────────────────────────────────
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
      override-destination: true
    QUIC:
      ports: [443, 8443]
      # false：只嗅探 SNI 用于规则匹配，不替换目标地址。
      # true 会破坏 QUIC Connection ID 迁移机制，触发 H3→TCP 降级。
      override-destination: false
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"
    - "+.local"
    - "+.lan"
    - "localhost"

# ── DNS ──────────────────────────────────────────────────────────
dns:
  enable: true
  cache-algorithm: arc
  ipv6: false
  listen: 127.0.0.1:1053
  use-hosts: true
  use-system-hosts: true
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist

  fake-ip-filter:
    # 本地 / 内网
    - "+.lan"
    - "+.local"
    - "localhost"
    - "+.localhost"
    - "+.home.arpa"
    # NTP
    - "time.windows.com"
    - "time.nist.gov"
    - "+.ntp.org"
    - "ntp.aliyun.com"
    - "ntp1.aliyun.com"
    - "ntp2.aliyun.com"
    - "ntp3.aliyun.com"
    - "ntp.tencent.com"
    # Windows NCSI
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "connectivitycheck.gstatic.com"
    - "captive.apple.com"
    # Windows 系统服务（需真实 IP 直连）
    - "+.rdp.microsoft.com"
    - "+.remoteapp.windowsazure.com"
    - "+.wsd.microsoft.com"
    - "+.notify.windows.com"
    - "+.wns.windows.com"
    - "+.windowsupdate.com"
    - "+.update.microsoft.com"
    - "+.push.apple.com"
    # Microsoft 认证（Edge 账号登录防异地告警）
    - "+.office365.com"
    - "+.teams.microsoft.com"
    - "+.cloud.microsoft"
    - "+.sharepoint.com"
    - "+.skype.com"
    - "+.skypeforbusiness.com"
    - "+.onedrive.com"
    - "+.lync.com"
    # mDNS
    - "_ipp._tcp.local"
    - "_pdl-datastream._tcp.local"
    - "_services._dns-sd._udp.local"
    # STUN/TURN/WebRTC（获真实 IP 后由 §1 丢弃）
    - "+.stun.l.google.com"
    - "stun.google.com"
    - "+.stun.services.mozilla.com"
    - "stun.cloudflare.com"
    - "+.turn.twilio.com"
    - "+.global.turn.twilio.com"
    - "stun.stunprotocol.org"
    - "+.xirsys.com"
    - "+.relay.metered.ca"
    - "+.webrtc.org"
    - "stun.nextcloud.com"
    - "stun.voip.blackberry.com"
    - "+.coturn.net"
    - "stun.sipgate.net"
    - "stun.counterpath.com"
    - "stun.schlund.de"

  # 节点域名解析 — 只用国内 DoH（代理建立前境外 DoH 无法直连）
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - "https://dns.alidns.com/dns-query"
    - "https://doh.pub/dns-query"

  direct-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  direct-nameserver-follow-policy: true

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  nameserver:
    # 境外 DNS 全部经 🌐 通用代理 隧道出站，ISP 不可见查询内容
    - "https://dns.cloudflare.com/dns-query#🌐 通用代理"
    - "https://dns.google/dns-query#🌐 通用代理"
    - "https://doh.opendns.com/dns-query#🌐 通用代理"

  nameserver-policy:
    "geosite:cn,private,apple,microsoft":
      - 223.5.5.5
      - 119.29.29.29
      - "https://dns.alidns.com/dns-query"
    "geosite:geolocation-!cn":
      - "https://dns.cloudflare.com/dns-query#🌐 通用代理"
      - "https://dns.google/dns-query#🌐 通用代理"

  # fallback — 防 GFW DNS 污染，境外域名自动切换代理 DoH 重新解析
  fallback:
    - "https://cloudflare-dns.com/dns-query#🌐 通用代理"
    - "https://dns.google/dns-query#🌐 通用代理"

  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
      - gfw
    domain:
      - "+.google.com"
      - "+.google.com.hk"
      - "+.googleapis.com"
      - "+.googlevideo.com"
      - "+.facebook.com"
      - "+.instagram.com"
      - "+.twitter.com"
      - "+.x.com"
      - "+.youtube.com"
      - "+.ytimg.com"
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
  disable-cache: false

# ── TUN ──────────────────────────────────────────────────────────
tun:
  enable: true
  # mixed：TCP = system（低开销）+ UDP = gvisor（隔离好）
  # ⚠️ Windows 防火墙需放行 mihomo 内核，否则 mixed/system 栈无法启动。
  # 放行路径：Windows安全中心 → 允许应用通过防火墙 → 选中 mihomo 内核
  stack: mixed
  device: Meta
  auto-route: true
  auto-redirect: false
  auto-detect-interface: true
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  endpoint-independent-nat: false
  strict-route: true
  mtu: 9000
  udp-timeout: 300

# ── proxy-providers ──────────────────────────────────────────────
proxy-providers:

  Edge-VPS1-Nodes:
    type: http
    url: "https://YOUR_EDGE_SUB_URL_HERE"
    path: ./providers/edge_vps1.yaml
    interval: 86400
    skip-cert-verify: false
    override:
      client-fingerprint: chrome
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300
      timeout: 5000
      lazy: true

  Chrome-VPS2-Nodes:
    type: http
    url: "https://YOUR_CHROME_SUB_URL_HERE"
    path: ./providers/chrome_vps2.yaml
    interval: 86400
    skip-cert-verify: false
    override:
      client-fingerprint: chrome
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300
      timeout: 5000
      lazy: true

  Firefox-VPS3-Nodes:
    type: http
    url: "https://YOUR_FIREFOX_SUB_URL_HERE"
    path: ./providers/firefox_vps3.yaml
    interval: 86400
    skip-cert-verify: false
    override:
      client-fingerprint: firefox
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300
      timeout: 5000
      lazy: true

  Brave-VPS4-Nodes:
    type: http
    url: "https://YOUR_BRAVE_SUB_URL_HERE"
    path: ./providers/brave_vps4.yaml
    interval: 86400
    skip-cert-verify: false
    override:
      client-fingerprint: chrome
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300
      timeout: 5000
      lazy: true

  Opera-VPS5-Nodes:
    type: http
    url: "https://YOUR_OPERA_SUB_URL_HERE"
    path: ./providers/opera_vps5.yaml
    interval: 86400
    skip-cert-verify: false
    override:
      client-fingerprint: chrome
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300
      timeout: 5000
      lazy: true

  Vivaldi-VPS6-Nodes:
    type: http
    url: "https://YOUR_VIVALDI_SUB_URL_HERE"
    path: ./providers/vivaldi_vps6.yaml
    interval: 86400
    skip-cert-verify: false
    override:
      client-fingerprint: chrome
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300
      timeout: 5000
      lazy: true

# ── proxy-groups ─────────────────────────────────────────────────
proxy-groups:

  - name: "🔍 Edge代理"
    type: select
    use:
      - Edge-VPS1-Nodes
    proxies:
      - "🔍 Edge自动"
      - "🔍 Edge故障切换"

  - name: "🔍 Edge自动"
    type: url-test
    use:
      - Edge-VPS1-Nodes
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    timeout: 5000
    tolerance: 50
    lazy: true

  - name: "🔍 Edge故障切换"
    type: fallback
    use:
      - Edge-VPS1-Nodes
    url: "https://www.gstatic.com/generate_204"
    interval: 60
    timeout: 5000
    lazy: false

  - name: "🟢 Chrome代理"
    type: select
    use:
      - Chrome-VPS2-Nodes
    proxies:
      - "🟢 Chrome自动"
      - "🟢 Chrome故障切换"

  - name: "🟢 Chrome自动"
    type: url-test
    use:
      - Chrome-VPS2-Nodes
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    timeout: 5000
    tolerance: 50
    lazy: true

  - name: "🟢 Chrome故障切换"
    type: fallback
    use:
      - Chrome-VPS2-Nodes
    url: "https://www.gstatic.com/generate_204"
    interval: 60
    timeout: 5000
    lazy: false

  - name: "🦊 Firefox代理"
    type: select
    use:
      - Firefox-VPS3-Nodes
    proxies:
      - "🦊 Firefox自动"
      - "🦊 Firefox故障切换"

  - name: "🦊 Firefox自动"
    type: url-test
    use:
      - Firefox-VPS3-Nodes
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    timeout: 5000
    tolerance: 50
    lazy: true

  - name: "🦊 Firefox故障切换"
    type: fallback
    use:
      - Firefox-VPS3-Nodes
    url: "https://www.gstatic.com/generate_204"
    interval: 60
    timeout: 5000
    lazy: false

  - name: "🦁 Brave代理"
    type: select
    use:
      - Brave-VPS4-Nodes
    proxies:
      - "🦁 Brave自动"
      - "🦁 Brave故障切换"

  - name: "🦁 Brave自动"
    type: url-test
    use:
      - Brave-VPS4-Nodes
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    timeout: 5000
    tolerance: 50
    lazy: true

  - name: "🦁 Brave故障切换"
    type: fallback
    use:
      - Brave-VPS4-Nodes
    url: "https://www.gstatic.com/generate_204"
    interval: 60
    timeout: 5000
    lazy: false

  - name: "🔴 Opera代理"
    type: select
    use:
      - Opera-VPS5-Nodes
    proxies:
      - "🔴 Opera自动"
      - "🔴 Opera故障切换"

  - name: "🔴 Opera自动"
    type: url-test
    use:
      - Opera-VPS5-Nodes
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    timeout: 5000
    tolerance: 50
    lazy: true

  - name: "🔴 Opera故障切换"
    type: fallback
    use:
      - Opera-VPS5-Nodes
    url: "https://www.gstatic.com/generate_204"
    interval: 60
    timeout: 5000
    lazy: false

  - name: "🟡 Vivaldi代理"
    type: select
    use:
      - Vivaldi-VPS6-Nodes
    proxies:
      - "🟡 Vivaldi自动"
      - "🟡 Vivaldi故障切换"

  - name: "🟡 Vivaldi自动"
    type: url-test
    use:
      - Vivaldi-VPS6-Nodes
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    timeout: 5000
    tolerance: 50
    lazy: true

  - name: "🟡 Vivaldi故障切换"
    type: fallback
    use:
      - Vivaldi-VPS6-Nodes
    url: "https://www.gstatic.com/generate_204"
    interval: 60
    timeout: 5000
    lazy: false

  - name: "🌐 通用代理"
    # ⚠️ 此组同时作为 DNS nameserver/fallback 出口。
    # 选择直连将导致所有境外 DNS 查询暴露给 ISP，隐私失效。
    type: select
    proxies:
      - "🔍 Edge代理"
      - "🟢 Chrome代理"
      - "🦊 Firefox代理"
      - "🦁 Brave代理"
      - "🔴 Opera代理"
      - "🟡 Vivaldi代理"
      - "🚫 直连"

  - name: "🚫 直连"
    type: select
    proxies:
      - DIRECT

  - name: "🛑 拦截"
    # REJECT（默认）：返回 RST，§0 DoT 拦截必须用此项（触发客户端立即回退到53端口）
    # REJECT-DROP：静默丢弃，§4b CN 域名拦截可选此项更隐蔽
    type: select
    proxies:
      - REJECT
      - REJECT-DROP

  - name: "🚫 UDP静默丢弃"
    # REJECT-DROP：不返回任何响应，防止 RST 触发浏览器重试，彻底消除 WebRTC/QUIC 噪声
    type: select
    proxies:
      - REJECT-DROP
      - REJECT

# ── rules ────────────────────────────────────────────────────────
rules:

  # §0  DoT/DoQ 853 → 拦截
  # 防 Windows 11 系统加密 DNS 绕过 dns-hijack。
  # 必须用 REJECT（RST 触发客户端立即回退到53端口被接管；DROP 会超时等待）
  - AND,((NETWORK,TCP),(DST-PORT,853)),🛑 拦截
  - AND,((NETWORK,UDP),(DST-PORT,853)),🛑 拦截

  # §1  所有浏览器 WebRTC/STUN/TURN UDP → 静默丢弃
  # 端口：3478-3481（标准STUN/TURN）· 5349-5350（DTLS）· 19302-19309（Google STUN）
  # 配合 fake-ip-filter 中的 STUN 域名，彻底阻断 WebRTC IP 泄露
  - AND,((PROCESS-NAME,msedge.exe),(NETWORK,UDP),(DST-PORT,3478-3481)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,msedge.exe),(NETWORK,UDP),(DST-PORT,5349-5350)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,msedge.exe),(NETWORK,UDP),(DST-PORT,19302-19309)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,msedgewebview2.exe),(NETWORK,UDP),(DST-PORT,3478-3481)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,msedgewebview2.exe),(NETWORK,UDP),(DST-PORT,5349-5350)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,msedgewebview2.exe),(NETWORK,UDP),(DST-PORT,19302-19309)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,chrome.exe),(NETWORK,UDP),(DST-PORT,3478-3481)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,chrome.exe),(NETWORK,UDP),(DST-PORT,5349-5350)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,chrome.exe),(NETWORK,UDP),(DST-PORT,19302-19309)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,chromium.exe),(NETWORK,UDP),(DST-PORT,3478-3481)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,chromium.exe),(NETWORK,UDP),(DST-PORT,5349-5350)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,chromium.exe),(NETWORK,UDP),(DST-PORT,19302-19309)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,firefox.exe),(NETWORK,UDP),(DST-PORT,3478-3481)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,firefox.exe),(NETWORK,UDP),(DST-PORT,5349-5350)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,firefox.exe),(NETWORK,UDP),(DST-PORT,19302-19309)),🚫 UDP静默丢弃
  - AND,((PROCESS-NAME,firefox-nightly.exe),(NETWORK,UDP),(DST-PORT,3478-3481)),🚫 UDP静默丢弃
