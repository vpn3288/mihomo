proxy-groups:

  - name: "🔍 Edge代理"
    type: select
    use:
      - Edge-VPS1-Nodes
    proxies:
      - "🔍 Edge自动"
      - "🔍 Edge故障切换"

  - name: "🔍 Edge自动"
    type: url-test
    use:
      - Edge-VPS1-Nodes
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    timeout: 5000
    tolerance: 50
    lazy: true

  - name: "🔍 Edge故障切换"
    type: fallback
    use:
      - Edge-VPS1-Nodes
    url: "https://www.gstatic.com/generate_204"
    interval: 60
    timeout: 5000

  - name: "🟢 Chrome代理"
    type: select
    use:
      - Chrome-VPS2-Nodes
    proxies:
      - "🟢 Chrome自动"
      - "🟢 Chrome故障切换"

  - name: "🟢 Chrome自动"
    type: url-test
    use:
      - Chrome-VPS2-Nodes
    url: "https://www.gstatic.com/generate_204"
