  - AND,((PROCESS-NAME,msedge.exe),(DOMAIN-SUFFIX,azure.com)),🚫 直连
  - AND,((PROCESS-NAME,msedge.exe),(DOMAIN-SUFFIX,bing.com)),🚫 直连
  - AND,((PROCESS-NAME,msedge.exe),(DOMAIN-SUFFIX,bing.net)),🚫 直连
  - AND,((PROCESS-NAME,msedge.exe),(DOMAIN-SUFFIX,msn.com)),🚫 直连
  - AND,((PROCESS-NAME,msedge.exe),(DOMAIN-SUFFIX,msedge.net)),🚫 直连
  - AND,((PROCESS-NAME,msedge.exe),(DOMAIN-SUFFIX,cloud.microsoft)),🚫 直连
  - AND,((PROCESS-NAME,msedge.exe),(DOMAIN-SUFFIX,sharepoint.com)),🚫 直连
  - AND,((PROCESS-NAME,msedge.exe),(DOMAIN-SUFFIX,skype.com)),🚫 直连
  - AND,((PROCESS-NAME,msedge.exe),(DOMAIN-SUFFIX,skypeforbusiness.com)),🚫 直连
  - AND,((PROCESS-NAME,msedge.exe),(DOMAIN-SUFFIX,onedrive.com)),🚫 直连
  - AND,((PROCESS-NAME,msedge.exe),(DOMAIN-SUFFIX,lync.com)),🚫 直连
  - AND,((PROCESS-NAME,msedgewebview2.exe),(DOMAIN-SUFFIX,microsoft.com)),🚫 直连
  - AND,((PROCESS-NAME,msedgewebview2.exe),(DOMAIN-SUFFIX,microsoftonline.com)),🚫 直连
  - AND,((PROCESS-NAME,msedgewebview2.exe),(DOMAIN-SUFFIX,live.com)),🚫 直连
  - AND,((PROCESS-NAME,msedgewebview2.exe),(DOMAIN-SUFFIX,office.com)),🚫 直连
